name: Build & Deploy to S3

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * *'   # refresh GitHub activity daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch GitHub activity
        run: node scripts/fetch-github-activity.mjs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: TanelDubolazov

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: infra
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://tanel.dev --delete --exclude "certs/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E17VEX1N16EDLG \
            --paths "/*"